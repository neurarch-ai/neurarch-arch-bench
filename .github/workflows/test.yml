name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      # Unit tests: verifier behaviour + every task is solvable by its reference.
      - run: npm test
      # Smoke: the keyless oracle leaderboard runs end to end with no API key.
      - run: node leaderboard.mjs --providers=reference
      # Calibration harness self-tests: reference must pass 100%, noop ~0%.
      # If either fails, the harness (not any model) is broken.
      - run: node calibrate.mjs --policy=reference --per-family=4
      - run: node calibrate.mjs --policy=noop --per-family=4
